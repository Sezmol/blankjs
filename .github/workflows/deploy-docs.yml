name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter docs build-app

      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # so deep links like /blankjs/components/select load the app
      - run: cp apps/docs/dist/index.html apps/docs/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

      - id: deployment
        uses: actions/deploy-pages@v4
